syntax = "proto3";

option csharp_namespace = "Pet.API.Protos";

package pet;

service PetGrpcService {
  rpc GetPetOwner (GetPetOwnerRequest) returns (GetPetOwnerResponse);
  rpc TransferPetOwnership (TransferPetOwnershipRequest) returns (TransferPetOwnershipResponse);
}

message GetPetOwnerRequest {
  string pet_id = 1;
}

message GetPetOwnerResponse {
  string owner_id = 1;
}

message TransferPetOwnershipRequest {
  string pet_id = 1;
  string new_owner_id = 2;
}

message TransferPetOwnershipResponse {
  bool success = 1;
}
