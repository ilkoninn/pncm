apiVersion: apps/v1
kind: Deployment
metadata:
  name: community-service
  namespace: pncm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: community-service
  template:
    metadata:
      labels:
        app: community-service
    spec:
      containers:
        - name: community-service
          image: ilkoninn/pncm-community:sha-3c56e83b9857ee6b20097804bae8476c50e0e51b
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
          envFrom:
            - configMapRef:
                name: pncm-config
            - secretRef:
                name: pncm-secrets
          env:
            - name: ConnectionStrings__DefaultConnection
              value: "Host=pncm-postgres;Port=5432;Database=pncm_community;Username=postgres;Password=postgres;Encoding=UTF8"
            - name: ConnectionStrings__Redis
              value: "pncm-redis:6379"
            - name: Kafka__BootstrapServers
              value: "pncm-kafka:29092"
            - name: Otlp__Endpoint
              value: "http://pncm-jaeger:4317"
---
apiVersion: v1
kind: Service
metadata:
  name: pncm-community
  namespace: pncm
spec:
  selector:
    app: community-service
  ports:
    - port: 80
      targetPort: 8080
