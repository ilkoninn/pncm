apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: pncm
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: ilkoninn/pncm-notification:sha-004dcc388c6fa8cbb5c92399dfa5fc8dc6259e3a
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
          envFrom:
            - configMapRef:
                name: pncm-config
            - secretRef:
                name: pncm-secrets
          env:
            - name: ConnectionStrings__DefaultConnection
              value: "Host=pncm-postgres;Port=5432;Database=pncm_notification;Username=postgres;Password=postgres;Encoding=UTF8"
            - name: Jwt__Issuer
              value: "pncm-identity"
            - name: Jwt__Audience
              value: "pncm-api"
            - name: Jwt__SecretKey
              valueFrom:
                secretKeyRef:
                  name: pncm-secrets
                  key: JWT_SECRET
            - name: Kafka__BootstrapServers
              value: "pncm-kafka:29092"
            - name: Otlp__Endpoint
              value: "http://pncm-jaeger:4317"
---
apiVersion: v1
kind: Service
metadata:
  name: pncm-notification
  namespace: pncm
spec:
  selector:
    app: notification-service
  ports:
    - port: 80
      targetPort: 8080
