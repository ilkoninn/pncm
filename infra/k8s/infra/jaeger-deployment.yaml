apiVersion: apps/v1
kind: Deployment
metadata:
  name: pncm-jaeger
  namespace: pncm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pncm-jaeger
  template:
    metadata:
      labels:
        app: pncm-jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:latest
          ports:
            - containerPort: 16686
            - containerPort: 4317
            - containerPort: 4318
---
apiVersion: v1
kind: Service
metadata:
  name: pncm-jaeger
  namespace: pncm
spec:
  selector:
    app: pncm-jaeger
  type: ClusterIP
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
