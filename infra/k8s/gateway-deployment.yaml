apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: pncm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: ilkoninn/pncm-gateway:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: pncm-config
            - secretRef:
                name: pncm-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: pncm-gateway
  namespace: pncm
spec:
  selector:
    app: gateway
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
