apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: pncm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: ilkoninn/pncm-gateway:sha-2ab8f50f529d936ff72348ee37e0263dbc921a82
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          envFrom:
            - configMapRef:
                name: pncm-config
            - secretRef:
                name: pncm-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: pncm-gateway
  namespace: pncm
spec:
  selector:
    app: gateway
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
