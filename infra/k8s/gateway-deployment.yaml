apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: pncm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: ilkoninn/pncm-gateway:sha-3c56e83b9857ee6b20097804bae8476c50e0e51b
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          envFrom:
            - configMapRef:
                name: pncm-config
            - secretRef:
                name: pncm-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: pncm-gateway
  namespace: pncm
spec:
  selector:
    app: gateway
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
  template:
    spec:
      containers:
        - image: ilkoninn/pncm-gateway:sha-3c56e83b9857ee6b20097804bae8476c50e0e51b
