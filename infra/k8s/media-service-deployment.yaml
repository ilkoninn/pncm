apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-service
  namespace: pncm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: media-service
  template:
    metadata:
      labels:
        app: media-service
    spec:
      containers:
        - name: media-service
          image: ilkoninn/pncm-media:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
          envFrom:
            - configMapRef:
                name: pncm-config
            - secretRef:
                name: pncm-secrets
          env:
            - name: ConnectionStrings__DefaultConnection
              value: "Host=pncm-postgres;Port=5432;Database=pncm_media;Username=postgres;Password=postgres;Encoding=UTF8"
            - name: MinIO__Endpoint
              value: "pncm-minio:9000"
            - name: MinIO__PublicEndpoint
              value: "localhost:9000"
            - name: MinIO__AccessKey
              valueFrom:
                secretKeyRef:
                  name: pncm-secrets
                  key: MINIO_ACCESS_KEY
            - name: MinIO__SecretKey
              valueFrom:
                secretKeyRef:
                  name: pncm-secrets
                  key: MINIO_SECRET_KEY
            - name: Otlp__Endpoint
              value: "http://pncm-jaeger:4317"
---
apiVersion: v1
kind: Service
metadata:
  name: pncm-media
  namespace: pncm
spec:
  selector:
    app: media-service
  ports:
    - port: 80
      targetPort: 8080
