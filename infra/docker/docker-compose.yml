version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: pncm_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [pncm_network]
  redis:
    image: redis:7-alpine
    container_name: pncm_redis
    ports:
      - "6379:6379"
    networks: [pncm_network]
  minio:
    image: minio/minio:latest
    container_name: pncm_minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    networks: [pncm_network]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: pncm_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - pncm_zookeeper:/var/lib/zookeeper/data
    networks: [pncm_network]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: pncm_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - pncm_kafka:/var/lib/kafka/data
    networks: [pncm_network]

volumes:
  postgres_data:
  minio_data:
  pncm_zookeeper:
  pncm_kafka:

networks:
  pncm_network:
    external: true