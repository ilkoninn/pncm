version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: pncm_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [pncm_network]
  redis:
    image: redis:7-alpine
    container_name: pncm_redis
    ports:
      - "6379:6379"
    networks: [pncm_network]
  minio:
    image: minio/minio:latest
    container_name: pncm_minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    networks: [pncm_network]

volumes:
  postgres_data:
  minio_data:

networks:
  pncm_network:
    external: true