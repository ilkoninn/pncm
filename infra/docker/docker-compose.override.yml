services:
  identity-service:
    build:
      context: ../../services/identity-service
      dockerfile: Dockerfile
    container_name: pncm_identity
    ports:
      - "5174:8080"
      - "5176:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=pncm_identity;Username=postgres;Password=postgres;Encoding=UTF8
      - ConnectionStrings__Redis=redis:6379
      - Jwt__SecretKey=your-secret-key-here-min-32-chars!!
      - Jwt__Issuer=pncm-identity
      - Jwt__Audience=pncm-api
      - Kafka__BootstrapServers=kafka:29092
      - Otlp__Endpoint=http://pncm_jaeger:4317
    depends_on:
      - postgres
      - redis
      - kafka
    networks: [pncm_network]
  store-service:
    build:
      context: ../../services/store-service
      dockerfile: Dockerfile
    container_name: pncm_store
    ports:
      - "5175:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=pncm_store;Username=postgres;Password=postgres;Encoding=UTF8
      - Otlp__Endpoint=http://pncm_jaeger:4317
    depends_on:
      - postgres
    networks: [pncm_network]
  media-service:
    build:
      context: ../../services/media-service
      dockerfile: Dockerfile
    container_name: pncm_media
    ports:
      - "5178:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=pncm_media;Username=postgres;Password=postgres;Encoding=UTF8
      - Otlp__Endpoint=http://pncm_jaeger:4317
      - MinIO__Endpoint=minio:9000
      - MinIO__PublicEndpoint=localhost:9000
      - MinIO__AccessKey=minioadmin
      - MinIO__SecretKey=minioadmin
    depends_on:
      - postgres
      - minio
    networks: [pncm_network]
  pet-service:
    build:
      context: ../../services/pet-service
      dockerfile: Dockerfile
    container_name: pncm_pet
    ports:
      - "5177:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Otlp__Endpoint=http://pncm_jaeger:4317
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=pncm_pet;Username=postgres;Password=postgres;Encoding=UTF8
    depends_on:
      - postgres
    networks: [pncm_network]
  adoption-service:
    build:
      context: ../../services/adoption-service
      dockerfile: Dockerfile
    container_name: pncm_adoption
    ports:
      - "5179:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=pncm_adoption;Username=postgres;Password=postgres;Encoding=UTF8
      - Kafka__BootstrapServers=kafka:29092
      - Otlp__Endpoint=http://pncm_jaeger:4317
    depends_on:
      - postgres
      - kafka
    networks: [pncm_network]
  community-service:
    build:
      context: ../../services/community-service
      dockerfile: Dockerfile
    container_name: pncm_community
    ports:
      - "5180:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=pncm_community;Username=postgres;Password=postgres;Encoding=UTF8
      - ConnectionStrings__Redis=redis:6379
      - Kafka__BootstrapServers=kafka:29092
      - Otlp__Endpoint=http://pncm_jaeger:4317
    depends_on:
      - postgres
      - redis
      - kafka
    networks: [pncm_network]
  notification-service:
    build:
      context: ../../services/notification-service
      dockerfile: Dockerfile
    container_name: pncm_notification
    ports:
      - "5181:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=pncm_notification;Username=postgres;Password=postgres;Encoding=UTF8
      - Kafka__BootstrapServers=kafka:29092
      - Otlp__Endpoint=http://pncm_jaeger:4317
    depends_on:
      - postgres
      - kafka
    networks: [pncm_network]
  gateway:
    build:
      context: ../../gateway/yarp
      dockerfile: Dockerfile
    container_name: pncm_gateway
    ports:
      - "5000:8080"
    depends_on:
      - identity-service
      - store-service
      - media-service
      - pet-service
      - adoption-service
      - community-service
      - notification-service
    networks: [pncm_network]

networks:
  pncm_network:
    external: true